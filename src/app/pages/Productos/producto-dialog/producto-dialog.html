<h2 mat-dialog-title>{{ data ? 'Editar Producto' : 'Nuevo Producto' }}</h2>

<mat-dialog-content>
  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="producto.nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <input matInput [(ngModel)]="producto.descripcion" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Precio de venta</mat-label>
      <input matInput type="number" [(ngModel)]="producto.precioVenta" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Stock mínimo</mat-label>
      <input matInput type="number" [(ngModel)]="producto.stockMinimo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Días máx. frescura</mat-label>
      <input matInput type="number" [(ngModel)]="producto.diasMaxFrescura" />
    </mat-form-field>

    <mat-checkbox [(ngModel)]="producto.esCombo">Es combo</mat-checkbox>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="guardar()">Guardar</button>
</mat-dialog-actions>
