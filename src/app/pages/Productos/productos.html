<div class="page-container">
  <div class="page-header">
    <h1>Productos</h1>
    <button mat-flat-button class="btn-primary" (click)="abrirDialog()" >
      <mat-icon>add</mat-icon>
      Nuevo producto
    </button>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Buscar por nombre</mat-label>
    <input matInput [(ngModel)]="filtroNombre" (ngModelChange)="cargarProductos()" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="productos()" class="tabla-productos">
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let p">{{ p.descripcion }}</td>
    </ng-container>

    <ng-container matColumnDef="precioVenta">
      <th mat-header-cell *matHeaderCellDef>Precio</th>
      <td mat-cell *matCellDef="let p">$ {{ p.precioVenta }}</td>
    </ng-container>

    <ng-container matColumnDef="stockMinimo">
      <th mat-header-cell *matHeaderCellDef>Stock mínimo</th>
      <td mat-cell *matCellDef="let p">{{ p.stockMinimo }}</td>
    </ng-container>

<ng-container matColumnDef="acciones">
  <th mat-header-cell *matHeaderCellDef></th>
  <td mat-cell *matCellDef="let p">
    <button mat-icon-button [matMenuTriggerFor]="menuAcciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menuAcciones="matMenu">
      <button mat-menu-item (click)="abrirDialog(p)">
        <mat-icon>edit</mat-icon>
        <span>Editar</span>
      </button>
      <button mat-menu-item (click)="eliminarProducto(p.id)">
        <mat-icon color="warn">delete</mat-icon>
        <span>Eliminar</span>
      </button>
    </mat-menu>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
</div>
