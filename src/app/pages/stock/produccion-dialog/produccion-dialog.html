<h2 mat-dialog-title>Registrar Producción</h2>

<mat-dialog-content>
  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Producto</mat-label>
      <mat-select [(ngModel)]="productoId">
        @for (p of productos(); track p.id) {
          <mat-option [value]="p.id">{{ p.nombre }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cantidad fabricada</mat-label>
      <input matInput type="number" [(ngModel)]="cantidad" min="1" />
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button class="btn-primary" (click)="guardar()">Registrar</button>
</mat-dialog-actions>
