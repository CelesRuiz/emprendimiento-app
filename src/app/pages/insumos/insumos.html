<div class="page-container">
  <div class="page-header">
    <h1>Insumos</h1>
    <button mat-flat-button class="btn-primary" (click)="abrirDialog()">
      <mat-icon>add</mat-icon>
      Nuevo insumo
    </button>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Buscar por nombre</mat-label>
    <input matInput [(ngModel)]="filtroNombre" (ngModelChange)="cargarInsumos()" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="insumos()" class="tabla-insumos">

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let i">{{ i.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="precioPorUnidad">
      <th mat-header-cell *matHeaderCellDef>Precio por unidad</th>
      <td mat-cell *matCellDef="let i">$ {{ i.precioPorUnidad }}</td>
    </ng-container>

    <ng-container matColumnDef="unidadMedida">
      <th mat-header-cell *matHeaderCellDef>Unidad</th>
      <td mat-cell *matCellDef="let i">{{ i.unidadMedida }}</td>
    </ng-container>

    <ng-container matColumnDef="stockMinimo">
      <th mat-header-cell *matHeaderCellDef>Stock mínimo</th>
      <td mat-cell *matCellDef="let i">{{ i.stockMinimo }}</td>
    </ng-container>

    <ng-container matColumnDef="creadoEn">
      <th mat-header-cell *matHeaderCellDef>Creado</th>
      <td mat-cell *matCellDef="let i">{{ i.creadoEn | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>

    <ng-container matColumnDef="actualizadoEn">
      <th mat-header-cell *matHeaderCellDef>Actualizado</th>
      <td mat-cell *matCellDef="let i">{{ i.actualizadoEn | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>

 <ng-container matColumnDef="acciones">
  <th mat-header-cell *matHeaderCellDef></th>
  <td mat-cell *matCellDef="let i">
    <button mat-icon-button [matMenuTriggerFor]="menuAcciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menuAcciones="matMenu">
      <button mat-menu-item (click)="abrirDialog(i)">
        <mat-icon>edit</mat-icon>
        <span>Editar</span>
      </button>
      <button mat-menu-item (click)="eliminarInsumo(i.id)">
        <mat-icon color="warn">delete</mat-icon>
        <span>Eliminar</span>
      </button>
    </mat-menu>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
</div>
