<div class="login-container">
  <div class="login-card">
    <h1 class="title">BrumaRest</h1>
    <p class="subtitle">Iniciá sesión para continuar</p>

    <form (ngSubmit)="onLogin()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" name="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" />
      </mat-form-field>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button mat-flat-button type="submit">Ingresar</button>
    </form>
  </div>
</div>
