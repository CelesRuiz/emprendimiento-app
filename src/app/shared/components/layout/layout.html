<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" opened class="sidenav">
    <div class="brand">
      <h2>BrumaRest</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/inicio" routerLinkActive="active-link">
        <mat-icon matListItemIcon>home</mat-icon>
        <span>Inicio</span>
      </a>
      <a mat-list-item routerLink="/productos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span>Productos</span>
      </a>
      <a mat-list-item routerLink="/insumos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>science</mat-icon>
        <span>Insumos</span>
      </a>
      <a mat-list-item routerLink="/pedidos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span>Pedidos</span>
      </a>
      <a mat-list-item routerLink="/stock" routerLinkActive="active-link">
        <mat-icon matListItemIcon>warehouse</mat-icon>
        <span>Stock</span>
      </a>
      <a mat-list-item routerLink="/proveedores" routerLinkActive="active-link">
        <mat-icon matListItemIcon>local_shipping</mat-icon>
        <span>Proveedores</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
<mat-toolbar class="navbar">
  <span class="spacer"></span>
  
 <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
  <span style="display: flex; align-items: center; gap: 8px;">
    <div class="avatar">{{ iniciales }}</div>
    <span class="user-name">{{ nombre }}</span>
    <mat-icon>arrow_drop_down</mat-icon>
  </span>
</button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item>
      <mat-icon>person</mat-icon>
      <span>Datos personales</span>
    </button>
    <button mat-menu-item>
      <mat-icon>lock</mat-icon>
      <span>Cambiar contraseña</span>
    </button>
    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      <span>Configuración</span>
    </button>
    <mat-divider />
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </mat-menu>
</mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
